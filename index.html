<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />

        <title>Frontend Mentor | Base Apparel coming soon page</title>

        <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
        <style>
            .attribution {
                font-size: 11px;
                text-align: center;
            }
            .attribution a {
                color: hsl(228, 45%, 44%);
            }
        </style>

        <!-- <link rel="preconnect" href="https://fonts.googleapis.com" />

        <link

        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main>
            <div id="content">
                <img src="images/logo.svg" alt="Base Apparel" id="logo" />
                <div id="hero"></div>
                <div id="content2">
                    <h1><span>We're</span> <span>coming soon</span></h1>

                    <p>
                        Hello fellow shoppers! We're currently building our
                        new<br />
                        fashion store. Add your email below to stay up-to-date
                        with announcements and our launch deals.
                    </p>

                    <form action="#">
                        <input type="email" placeholder="Email Address" />
                        <button type="submit" title="Submit">
                            <img src="images/icon-arrow.svg" alt="" />
                        </button>
                        <p id="noti"></p>
                    </form>
                </div>
            </div>
            <!-- <img src="images/hero-desktop.jpg" alt="" id="hero" /> -->
        </main>

        <!-- <footer>
            <p class="attribution">
                Challenge by
                <a
                    href="https://www.frontendmentor.io?ref=challenge"
                    target="_blank"
                    >Frontend Mentor</a
                >. Coded by
                <a href="https://github.com/vietthong31">Thong Nguyen</a>.
            </p>
        </footer> -->
    </body>

    <script>
        const validateEmail = (email) => {
            return String(email)
                .toLowerCase()
                .match(
                    /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/
                );
        };

        function checkEmail(event) {
            noEmail = email.value === "";
            notValid = !validateEmail(email.value);
            if (noEmail) {
                noti.innerHTML = "Please provide an email";
            } else if (notValid) {
                noti.innerHTML = "Please provide a valid email";
            }

            if (noEmail || notValid) {
                img = document.createElement("img");
                img.src = "images/icon-error.svg";
                img.style = "grid-area: 1/9/2/10; place-self: center;";
                form.appendChild(img);
            }
            event.preventDefault();
        }
        form = document.querySelector("form");
        email = document.querySelector("form input[type='email']");
        noti = document.getElementById("noti");
        form.addEventListener("submit", checkEmail);
    </script>
</html>
